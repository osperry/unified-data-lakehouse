name: OSV Scanner

# Supply-chain vulnerability scanning via OSV.dev.
# - PR scan flags only NEW vulns introduced by the change.
# - Push + scheduled scan posts results to Security > Code scanning.
# - Lockfile (requirements.txt) is the source of truth.

on:
  pull_request:
    branches: ["main"]
  merge_group:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: "30 12 * * 1"   # Mondays, 12:30 UTC
  workflow_dispatch:         # manual trigger

permissions:
  actions: read
  contents: read
  security-events: write     # required to upload SARIF to Security tab

jobs:
  scan-pr:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.4"
    with:
      scan-args: |-
        --lockfile=requirements.txt

  scan-scheduled:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.4"
    with:
      scan-args: |-
        --lockfile=requirements.txt
